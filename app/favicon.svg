<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f0f0f"/>

  <!-- Green header bar -->
  <rect x="80" y="120" width="352" height="36" rx="8" fill="#1D9E75"/>

  <!-- Expense rows -->
  <rect x="80" y="172" width="260" height="16" rx="4" fill="#1a1a1a"/>
  <rect x="80" y="172" width="80"  height="16" rx="4" fill="#2d2d2d"/>
  <rect x="360" y="172" width="72" height="16" rx="4" fill="#1D9E75"/>

  <rect x="80" y="198" width="260" height="16" rx="4" fill="#1a1a1a"/>
  <rect x="80" y="198" width="100" height="16" rx="4" fill="#2d2d2d"/>
  <rect x="360" y="198" width="72" height="16" rx="4" fill="#378ADD"/>

  <rect x="80" y="224" width="260" height="16" rx="4" fill="#1a1a1a"/>
  <rect x="80" y="224" width="60"  height="16" rx="4" fill="#2d2d2d"/>
  <rect x="360" y="224" width="72" height="16" rx="4" fill="#D85A30"/>

  <!-- Divider -->
  <rect x="80" y="256" width="352" height="2" rx="1" fill="#222"/>

  <!-- Bottom action bar -->
  <rect x="80"  y="272" width="100" height="32" rx="8" fill="#1D9E75"/>
  <rect x="192" y="272" width="100" height="32" rx="8" fill="#1a1a1a"/>
  <rect x="304" y="272" width="100" height="32" rx="8" fill="#1a1a1a"/>

  <!-- Progress bar -->
  <rect x="80" y="320" width="352" height="8" rx="4" fill="#1a1a1a"/>
  <rect x="80" y="320" width="180" height="8" rx="4" fill="#1D9E75"/>

  <!-- Dot indicator -->
  <circle cx="256" cy="400" r="20" fill="#1D9E75"/>
  <rect x="248" y="392" width="16" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="248" y="399" width="10" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="248" y="406" width="13" height="3" rx="1" fill="#0f0f0f"/>
</svg>
